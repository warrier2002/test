<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .search-box:focus {
            border-color: var(--primary);
        }

        .record-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            transition: all 0.25s ease;
        }

        .record-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .record-field {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .record-field:last-child {
            border-bottom: none;
        }

        .field-key {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field-value {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            color: #fff;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .count-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 0.4rem;
        }

        .no-results {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 2rem;
            font-size: 0.9rem;
        }

        .glass-container {
            max-width: 600px;
        }
    </style>
</head>

<body>
    <div class="glass-container">
        <h1>Data Viewer</h1>
        <p style="margin-bottom: 1.5rem; color: rgba(255,255,255,0.5); font-size: 0.85rem;">Browse and search records
            stored in DB.</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('submissions')">Submissions <span id="sub-count"
                    class="count-badge">0</span></button>
            <button class="tab-btn" onclick="switchTab('todos')">To-Do Items <span id="todo-count"
                    class="count-badge">0</span></button>
        </div>

        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search by name, email, or any field..."
            oninput="filterRecords()">

        <div id="records-container"></div>

        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="/" style="color: var(--primary); font-size: 0.875rem; text-decoration: none;">← Back to Home</a>
        </div>
    </div>

    <script>
        let allData = { submissions: [], todos: [] };
        let currentTab = 'submissions';

        async function loadData() {
            const res = await fetch('/api/alldata');
            allData = await res.json();
            document.getElementById('sub-count').textContent = allData.submissions.length;
            document.getElementById('todo-count').textContent = allData.todos.length;
            renderRecords(allData.submissions);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            document.getElementById('searchInput').value = '';
            renderRecords(tab === 'submissions' ? allData.submissions : allData.todos);
        }

        function filterRecords() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const dataset = currentTab === 'submissions' ? allData.submissions : allData.todos;
            const filtered = dataset.filter(record =>
                Object.values(record).some(val =>
                    String(val).toLowerCase().includes(query)
                )
            );
            renderRecords(filtered);
        }

        function renderRecords(records) {
            const container = document.getElementById('records-container');
            if (records.length === 0) {
                container.innerHTML = '<div class="no-results">No records found.</div>';
                return;
            }
            container.innerHTML = records.map(record => {
                const fields = Object.entries(record)
                    .map(([key, val]) => `
                        <div class="record-field">
                            <span class="field-key">${key}</span>
                            <span class="field-value">${val}</span>
                        </div>
                    `).join('');
                return `<div class="record-card">${fields}</div>`;
            }).join('');
        }

        loadData();
    </script>
</body>

</html>
